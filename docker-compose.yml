services:
  padel:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: padel-amistoso:latest
    container_name: padel-amistoso
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      # Persist tournament and user data on the NAS host
      - ./data:/app/data
    environment:
      PADEL_JWT_SECRET: ${PADEL_JWT_SECRET}
      DEMO_MODE: ${DEMO_MODE:-false}
      PADEL_DATA_DIR: /app/data
      PADEL_SQLITE_TIMEOUT_SECS: ${PADEL_SQLITE_TIMEOUT_SECS:-15}
      PADEL_SQLITE_BUSY_TIMEOUT_MS: ${PADEL_SQLITE_BUSY_TIMEOUT_MS:-15000}
      PADEL_SQLITE_SYNCHRONOUS: ${PADEL_SQLITE_SYNCHRONOUS:-NORMAL}
      AMISTOSO_SMTP_HOST: ${AMISTOSO_SMTP_HOST:-None}
      AMISTOSO_SMTP_PORT: ${AMISTOSO_SMTP_PORT:-None}
      AMISTOSO_SMTP_USER: ${AMISTOSO_SMTP_USER:-None}
      AMISTOSO_SMTP_PASS: ${AMISTOSO_SMTP_PASS:-None}
      AMISTOSO_FROM_EMAIL: ${AMISTOSO_FROM_EMAIL:-None}
      AMISTOSO_SMTP_USE_TLS: ${AMISTOSO_SMTP_USE_TLS:-None}
      AMISTOSO_SITE_URL: ${AMISTOSO_SITE_URL:-None}
