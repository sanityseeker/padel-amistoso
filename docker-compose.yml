services:
  padel:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: padel-amistoso:latest
    container_name: padel-amistoso
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      # Persist tournament and user data on the NAS host
      - ./data:/app/data
    environment:
      PADEL_JWT_SECRET: ${PADEL_JWT_SECRET}
      DEMO_MODE: ${DEMO_MODE:-false}
      PADEL_DATA_DIR: /app/data
      PADEL_SQLITE_TIMEOUT_SECS: ${PADEL_SQLITE_TIMEOUT_SECS:-15}
      PADEL_SQLITE_BUSY_TIMEOUT_MS: ${PADEL_SQLITE_BUSY_TIMEOUT_MS:-15000}
      PADEL_SQLITE_SYNCHRONOUS: ${PADEL_SQLITE_SYNCHRONOUS:-NORMAL}
