<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel API Playground</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1rem;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.4rem; }
    p { color: var(--text-muted); margin: 0.4rem 0 0.8rem; }
    .grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.7rem;
    }
    label { color: var(--text-muted); font-size: 0.9rem; }
    input, select, textarea, button {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.55rem;
      font-size: 0.9rem;
    }
    textarea {
      min-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      resize: vertical;
    }
    .actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.6rem;
    }
    .btn {
      width: auto;
      cursor: pointer;
      border: none;
      font-weight: 600;
      padding: 0.55rem 1rem;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--border); color: var(--text); }
    .status {
      margin-top: 0.6rem;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .status.ok { border-color: var(--green); color: var(--green); }
    .status.err { border-color: var(--red); color: var(--red); }
    pre {
      margin: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.8rem;
      overflow: auto;
      min-height: 220px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Padel API Playground</h1>
      <p>Interactive request tester for this project API. Replace <code>{tournament_id}</code>, <code>{match_id}</code> etc. with real IDs. For full OpenAPI docs, see <a href="/docs" target="_blank" rel="noopener noreferrer">/docs</a>.</p>

      <div class="grid">
        <label for="method">Method</label>
        <select id="method">
          <option>GET</option>
          <option>POST</option>
          <option>DELETE</option>
          <option>PUT</option>
          <option>PATCH</option>
        </select>

        <label for="path">Path</label>
        <input id="path" value="/api/tournaments" placeholder="/api/...">

        <label for="preset">Preset</label>
        <select id="preset" onchange="applyPreset()">
          <option value="">Custom</option>
          <optgroup label="CRUD">
            <option value="list">List tournaments</option>
            <option value="delete">Delete tournament</option>
          </optgroup>
          <optgroup label="Group + Play-off">
            <option value="create_gp">Create GP tournament</option>
            <option value="gp_status">GP status</option>
            <option value="gp_groups">GP groups &amp; standings</option>
            <option value="gp_record_group">Record GP group score</option>
            <option value="gp_record_group_tennis">Record GP group tennis score</option>
            <option value="gp_start_playoffs">Start GP play-offs</option>
            <option value="gp_playoffs">GP play-off bracket</option>
            <option value="gp_record_playoff">Record GP play-off score</option>
            <option value="gp_record_playoff_tennis">Record GP play-off tennis score</option>
          </optgroup>
          <optgroup label="Mexicano">
            <option value="create_mex">Create Mexicano tournament</option>
            <option value="mex_status">Mex status</option>
            <option value="mex_matches">Mex matches</option>
            <option value="mex_record">Record Mex score</option>
            <option value="mex_propose">Propose pairings</option>
            <option value="mex_next_round">Commit next round</option>
            <option value="mex_custom_round">Commit custom round</option>
            <option value="mex_end">End Mex rounds</option>
            <option value="mex_finish">Finish without play-offs</option>
            <option value="mex_recommend">Recommend play-off seeds</option>
            <option value="mex_start_playoffs">Start Mex play-offs</option>
            <option value="mex_playoffs">Mex play-off bracket</option>
            <option value="mex_record_playoff">Record Mex play-off score</option>
            <option value="mex_record_playoff_tennis">Record Mex play-off tennis score</option>
          </optgroup>
          <optgroup label="Schema / Visualisation">
            <option value="schema_get">Bracket preview (GET)</option>
            <option value="schema_post">Bracket preview (POST)</option>
          </optgroup>
        </select>

        <label for="body">JSON body</label>
        <textarea id="body" placeholder="{\n  \"key\": \"value\"\n}"></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="sendRequest()">Send request</button>
        <button class="btn btn-ghost" onclick="clearOutput()">Clear output</button>
      </div>
      <div id="status" class="status">Ready.</div>
    </div>

    <div class="card">
      <h1 style="font-size:1.05rem">Response</h1>
      <pre id="output">No request yet.</pre>
    </div>
  </div>

  <script>
    function applyPreset() {
      const preset = document.getElementById('preset').value;
      const method = document.getElementById('method');
      const path = document.getElementById('path');
      const body = document.getElementById('body');
      const TID = '{tournament_id}';

      const presets = {
        list: { m: 'GET', p: '/api/tournaments', b: '' },
        delete: { m: 'DELETE', p: `/api/tournaments/${TID}`, b: '' },

        // Group + Play-off
        create_gp: {
          m: 'POST', p: '/api/tournaments/group-playoff',
          b: { name: 'API Playground GP', player_names: ['Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Hank'], team_mode: false, court_names: ['Court 1','Court 2'], num_groups: 2, top_per_group: 2, double_elimination: false }
        },
        gp_status: { m: 'GET', p: `/api/tournaments/${TID}/gp/status`, b: '' },
        gp_groups: { m: 'GET', p: `/api/tournaments/${TID}/gp/groups`, b: '' },
        gp_record_group: {
          m: 'POST', p: `/api/tournaments/${TID}/gp/record-group`,
          b: { match_id: '{match_id}', score1: 21, score2: 15 }
        },
        gp_record_group_tennis: {
          m: 'POST', p: `/api/tournaments/${TID}/gp/record-group-tennis`,
          b: { match_id: '{match_id}', sets: [[6,3],[4,6],[6,2]] }
        },
        gp_start_playoffs: { m: 'POST', p: `/api/tournaments/${TID}/gp/start-playoffs`, b: '' },
        gp_playoffs: { m: 'GET', p: `/api/tournaments/${TID}/gp/playoffs`, b: '' },
        gp_record_playoff: {
          m: 'POST', p: `/api/tournaments/${TID}/gp/record-playoff`,
          b: { match_id: '{match_id}', score1: 21, score2: 18 }
        },
        gp_record_playoff_tennis: {
          m: 'POST', p: `/api/tournaments/${TID}/gp/record-playoff-tennis`,
          b: { match_id: '{match_id}', sets: [[6,4],[7,5]] }
        },

        // Mexicano
        create_mex: {
          m: 'POST', p: '/api/tournaments/mexicano',
          b: { name: 'API Playground Mexicano', player_names: ['Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Hank'], court_names: ['Court 1','Court 2'], total_points_per_match: 32, num_rounds: 3, randomness: 0.15 }
        },
        mex_status: { m: 'GET', p: `/api/tournaments/${TID}/mex/status`, b: '' },
        mex_matches: { m: 'GET', p: `/api/tournaments/${TID}/mex/matches`, b: '' },
        mex_record: {
          m: 'POST', p: `/api/tournaments/${TID}/mex/record`,
          b: { match_id: '{match_id}', score1: 20, score2: 12 }
        },
        mex_propose: { m: 'GET', p: `/api/tournaments/${TID}/mex/propose-pairings?n=3`, b: '' },
        mex_next_round: {
          m: 'POST', p: `/api/tournaments/${TID}/mex/next-round`,
          b: { option_id: null }
        },
        mex_custom_round: {
          m: 'POST', p: `/api/tournaments/${TID}/mex/custom-round`,
          b: { matches: [{ team1_ids: ['{p1}','{p2}'], team2_ids: ['{p3}','{p4}'] }], sit_out_ids: null }
        },
        mex_end: { m: 'POST', p: `/api/tournaments/${TID}/mex/end`, b: '' },
        mex_finish: { m: 'POST', p: `/api/tournaments/${TID}/mex/finish`, b: '' },
        mex_recommend: { m: 'GET', p: `/api/tournaments/${TID}/mex/recommend-playoffs?n_teams=4`, b: '' },
        mex_start_playoffs: {
          m: 'POST', p: `/api/tournaments/${TID}/mex/start-playoffs`,
          b: { team_player_ids: null, n_teams: 4, double_elimination: false }
        },
        mex_playoffs: { m: 'GET', p: `/api/tournaments/${TID}/mex/playoffs`, b: '' },
        mex_record_playoff: {
          m: 'POST', p: `/api/tournaments/${TID}/mex/record-playoff`,
          b: { match_id: '{match_id}', score1: 21, score2: 17 }
        },
        mex_record_playoff_tennis: {
          m: 'POST', p: `/api/tournaments/${TID}/mex/record-playoff-tennis`,
          b: { match_id: '{match_id}', sets: [[6,3],[6,4]] }
        },

        // Schema
        schema_get: { m: 'GET', p: '/api/schema/preview?group_sizes=4,4&advance_per_group=2&elimination=single', b: '' },
        schema_post: {
          m: 'POST', p: '/api/schema/preview',
          b: { group_sizes: [4,4], advance_per_group: 2, elimination: 'single', title: 'Preview Bracket' }
        },
      };

      const cfg = presets[preset];
      if (!cfg) return;
      method.value = cfg.m;
      path.value = cfg.p;
      body.value = (typeof cfg.b === 'object' && cfg.b !== '') ? JSON.stringify(cfg.b, null, 2) : cfg.b;
    }

    function clearOutput() {
      document.getElementById('output').textContent = 'No request yet.';
      const status = document.getElementById('status');
      status.className = 'status';
      status.textContent = 'Ready.';
    }

    async function sendRequest() {
      const method = document.getElementById('method').value;
      const path = document.getElementById('path').value.trim();
      const bodyText = document.getElementById('body').value.trim();
      const output = document.getElementById('output');
      const status = document.getElementById('status');

      if (!path.startsWith('/')) {
        status.className = 'status err';
        status.textContent = 'Path must start with /. Example: /api/tournaments';
        return;
      }

      const opts = { method, headers: {} };
      if (method !== 'GET' && method !== 'DELETE') {
        if (bodyText) {
          try {
            JSON.parse(bodyText);
          } catch (error) {
            status.className = 'status err';
            status.textContent = 'Invalid JSON body.';
            return;
          }
          opts.headers['Content-Type'] = 'application/json';
          opts.body = bodyText;
        }
      }

      status.className = 'status';
      status.textContent = 'Sending...';
      output.textContent = 'Loading...';

      try {
        const started = performance.now();
        const res = await fetch(path, opts);
        const elapsed = Math.round(performance.now() - started);
        const raw = await res.text();
        let rendered = raw;

        try {
          rendered = JSON.stringify(JSON.parse(raw), null, 2);
        } catch (_) {
          // Keep non-JSON text as-is
        }

        output.textContent = rendered || '(empty response)';
        status.className = `status ${res.ok ? 'ok' : 'err'}`;
        status.textContent = `${res.status} ${res.statusText} • ${elapsed}ms`;
      } catch (error) {
        output.textContent = error.message;
        status.className = 'status err';
        status.textContent = 'Request failed.';
      }
    }
  </script>
</body>
</html>
