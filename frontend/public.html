<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="txt_txt_app_title">Torneos Amistosos</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3b82f6">
<link rel="apple-touch-icon" href="/icon-192.png">
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js');</script>
<link rel="stylesheet" href="/tv.css">
</head>
<body>
<div id="tv-root">
  <div class="tv-loading" data-i18n="txt_txt_loading_tournament_display">Loading tournament display…</div>
</div>
<div style="text-align:center;padding:3rem 0 2.5rem;">
  <a href="https://ko-fi.com/torneosamistosos" target="_blank" rel="noopener">
    <img height="36" style="border:0;height:36px;" src="https://storage.ko-fi.com/cdn/kofi2.png?v=3" alt="Buy Me a Coffee at ko-fi.com">
  </a>
</div>
<div id="abbrev-popup" role="tooltip"></div>

<div id="bracket-lightbox" role="dialog" aria-modal="true" aria-label="Bracket" onclick="_closeBracketLightbox(event)">
  <button class="bracket-lightbox-close" onclick="_closeBracketLightbox()" aria-label="Close">✕</button>
  <div class="bracket-lightbox-scroll">
    <img id="bracket-lightbox-img" src="" alt="Bracket">
  </div>
</div>


<script src="/i18n.js"></script>
<script src="/shared.js"></script>
<script src="/tv.js"></script>

</body>
</html>
